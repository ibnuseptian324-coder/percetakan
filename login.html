<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login Admin | Nadien's Grafika</title>
<style>:root{--y:#ffdd00;--g:#00a651;--b:#0072bc;--n:#062a45;--m:#64748b;--r:#c62828}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;min-height:100vh;background:radial-gradient(circle at 10% 20%,#ffdd00cc,transparent 30%),radial-gradient(circle at 90% 10%,#00a651aa,transparent 28%),linear-gradient(135deg,var(--n),var(--b));display:grid;place-items:center;padding:30px}.card{width:100%;max-width:460px;background:white;border-radius:30px;padding:36px;box-shadow:0 20px 60px #0005}.back{display:inline-block;color:var(--b);font-weight:900;text-decoration:none;margin-bottom:24px}.brand{display:flex;gap:13px;align-items:center;margin-bottom:28px}.logo{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--y),var(--g),var(--b));display:grid;place-items:center;font-weight:900;color:var(--n)}h1{font-size:22px;color:var(--n);text-transform:uppercase}.brand p,.desc{color:var(--m);font-weight:700}.desc{line-height:1.6;margin:8px 0 22px}.title{font-size:34px;color:var(--n)}label{display:block;font-weight:900;margin:12px 0 7px}input{width:100%;padding:14px;border:1px solid #dfe8f1;border-radius:14px;font-size:15px}.btn{width:100%;border:0;border-radius:999px;background:var(--y);color:var(--n);font-weight:900;padding:14px;margin-top:16px;cursor:pointer}.err{display:none;background:#ffe0e0;color:#9b1c1c;padding:13px;border-radius:14px;margin:14px 0 0;font-weight:900}.demo{background:#f1f5f9;border-radius:16px;padding:14px;color:#344255;line-height:1.6;margin-top:18px}</style>
</head>
<body><main class="card"><a class="back" href="index.html">← Kembali ke Website</a><div class="brand"><div class="logo">NG</div><div><h1>Nadien's Grafika</h1><p>Login Admin</p></div></div><h2 class="title">Masuk Admin</h2><p class="desc">Login untuk membuka data pelanggan dan mengedit produk.</p><div class="err" id="err">Username atau password salah.</div><form onsubmit="login(event)"><label>Username</label><input id="u" required placeholder="Username"><label>Password</label><input id="p" type="password" required placeholder="Password"><button class="btn">Masuk</button></form><div class="demo"><b>Login default:</b><br>Username: admin<br>Password: nadien123</div></main><script>function login(e){e.preventDefault();if(u.value.trim()==='admin'&&p.value.trim()==='nadien123'){localStorage.ng_admin_login='true';location.href='admin.html'}else err.style.display='block'}</script></body></html>
